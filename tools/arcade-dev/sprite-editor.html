<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>ArcadeOS Sprite Editor</title>
<style>
  :root { --bg:#0a0c22; --panel:#12163c; --line:#5064ff; --text:#e8ecff; --dim:#7884c8; }
  * { box-sizing:border-box; margin:0; }
  body { background:var(--bg); color:var(--text); font-family:ui-monospace,Menlo,monospace;
         display:flex; flex-direction:column; align-items:center; padding:24px; gap:16px; }
  h1 { font-size:20px; letter-spacing:2px; }
  h1 span { color:var(--line); }
  .row { display:flex; gap:16px; flex-wrap:wrap; justify-content:center; align-items:flex-start; }
  .panel { background:var(--panel); border:2px solid var(--line); border-radius:8px; padding:14px; }
  canvas#grid { image-rendering:pixelated; cursor:crosshair; border:2px solid var(--line); background:
    repeating-conic-gradient(#1a1f4a 0% 25%, #12163c 0% 50%) 0 0/16px 16px; }
  .tools { display:flex; flex-direction:column; gap:10px; min-width:210px; }
  button, select { background:#1a2050; color:var(--text); border:1px solid var(--line);
    border-radius:4px; padding:6px 10px; font:inherit; cursor:pointer; }
  button:hover { background:#26308c; }
  button.active { background:var(--line); color:#fff; }
  .swatches { display:grid; grid-template-columns:repeat(8,24px); gap:4px; }
  .sw { width:24px; height:24px; border:1px solid #000; border-radius:3px; cursor:pointer; }
  .sw.sel { outline:2px solid #fff; }
  .sw.trans { background:repeating-conic-gradient(#666 0% 25%, #333 0% 50%) 0 0/8px 8px; }
  #preview { image-rendering:pixelated; border:1px solid var(--line); background:#0a0c22; }
  textarea { width:640px; height:170px; background:#0a0c22; color:#9fe89f; border:1px solid var(--line);
    border-radius:4px; font:11px ui-monospace,Menlo,monospace; padding:8px; }
  label { color:var(--dim); font-size:12px; }
  .hint { color:var(--dim); font-size:11px; max-width:640px; text-align:center; }
  input[type=color] { width:48px; height:28px; border:none; background:none; cursor:pointer; }
  input[type=text] { background:#0a0c22; color:var(--text); border:1px solid var(--line);
    border-radius:4px; padding:5px; font:inherit; width:120px; }
</style>
</head>
<body>
<h1>ARCADE<span>OS</span> SPRITE EDITOR</h1>

<div class="row">
  <div class="panel"><canvas id="grid"></canvas></div>

  <div class="panel tools">
    <label>SPRITE NAME</label>
    <input type="text" id="name" value="hero" spellcheck="false">
    <label>SIZE</label>
    <select id="size">
      <option value="8">8 x 8</option>
      <option value="16" selected>16 x 16</option>
      <option value="24">24 x 24</option>
      <option value="32">32 x 32</option>
    </select>
    <label>TOOL</label>
    <div class="row" style="gap:6px">
      <button id="t-paint" class="active">PAINT</button>
      <button id="t-erase">ERASE</button>
      <button id="t-fill">FILL</button>
      <button id="t-pick">PICK</button>
    </div>
    <label>PALETTE (right-click a swatch to replace it)</label>
    <div class="swatches" id="swatches"></div>
    <div class="row" style="gap:6px; align-items:center">
      <input type="color" id="custom" value="#ffd37e">
      <label>custom &rarr; click a swatch</label>
    </div>
    <label>PREVIEW (1x 2x 4x)</label>
    <canvas id="preview" width="232" height="72"></canvas>
    <div class="row" style="gap:6px">
      <button id="undo">UNDO</button>
      <button id="clear">CLEAR</button>
    </div>
  </div>
</div>

<div class="panel">
  <div class="row" style="gap:8px; margin-bottom:8px">
    <button id="export">EXPORT C</button>
    <button id="copy">COPY</button>
    <button id="download">DOWNLOAD .h</button>
  </div>
  <textarea id="out" spellcheck="false" placeholder="EXPORT C writes SDK sprite code here — paste it into your game's sprites.h"></textarea>
</div>

<p class="hint">Pixels are 0x00RRGGBB; erased cells export as SURF_TRANSPARENT and are skipped
by arcade_draw_sprite(). Work is auto-saved to this browser (localStorage).
Drawing: left-drag paints, E toggles eraser, U undoes.</p>

<script>
"use strict";
const TRANS = null;                       // erased pixel
const grid = document.getElementById("grid");
const gctx = grid.getContext("2d");
const prev = document.getElementById("preview");
const pctx = prev.getContext("2d");

let N = 16;                               // sprite is N x N
let CELL = 24;                            // on-screen cell size
let px = [];                              // N*N of "#rrggbb" | null
let tool = "paint";
let color = "#ffd37e";
let undoStack = [];

const defaultPalette = ["#ffffff","#ffd37e","#e05050","#3c64ff","#78dc96",
  "#ffdc50","#b478ff","#1b2450","#0a0c22","#ff9078","#50c8c8","#c8c8d2",
  "#787878","#a05028","#f0a0c8","#000000"];
let palette = [...defaultPalette];
let selSwatch = 1;

function blank(n) { return Array(n * n).fill(TRANS); }

function resize(n) {
  N = n;
  CELL = Math.max(12, Math.floor(384 / N));
  grid.width = grid.height = N * CELL;
  if (px.length !== N * N) px = blank(N);
  draw();
}

function draw() {
  gctx.clearRect(0, 0, grid.width, grid.height);
  for (let y = 0; y < N; y++)
    for (let x = 0; x < N; x++) {
      const c = px[y * N + x];
      if (c) { gctx.fillStyle = c; gctx.fillRect(x * CELL, y * CELL, CELL, CELL); }
    }
  gctx.strokeStyle = "rgba(80,100,255,.25)";
  for (let i = 0; i <= N; i++) {
    gctx.beginPath(); gctx.moveTo(i * CELL, 0); gctx.lineTo(i * CELL, N * CELL); gctx.stroke();
    gctx.beginPath(); gctx.moveTo(0, i * CELL); gctx.lineTo(N * CELL, i * CELL); gctx.stroke();
  }
  drawPreview();
  localStorage.setItem("arcade-sprite",
    JSON.stringify({ n: N, px, palette, name: document.getElementById("name").value }));
}

function drawPreview() {
  pctx.clearRect(0, 0, prev.width, prev.height);
  let ox = 8;
  for (const s of [1, 2, 4]) {
    for (let y = 0; y < N; y++)
      for (let x = 0; x < N; x++) {
        const c = px[y * N + x];
        if (c) { pctx.fillStyle = c; pctx.fillRect(ox + x * s, 36 - (N * s) / 2 + y * s, s, s); }
      }
    ox += N * s + 12;
  }
}

function cellAt(ev) {
  const r = grid.getBoundingClientRect();
  const x = Math.floor((ev.clientX - r.left) / CELL);
  const y = Math.floor((ev.clientY - r.top) / CELL);
  return (x >= 0 && y >= 0 && x < N && y < N) ? y * N + x : -1;
}

function snapshot() {
  undoStack.push([...px]);
  if (undoStack.length > 64) undoStack.shift();
}

function apply(i) {
  if (i < 0) return;
  if (tool === "paint") px[i] = color;
  else if (tool === "erase") px[i] = TRANS;
  else if (tool === "pick") { if (px[i]) { color = px[i]; setTool("paint"); } return; }
  else if (tool === "fill") {
    const target = px[i], fill = color;
    if (target === fill) return;
    const stack = [i];
    while (stack.length) {
      const j = stack.pop();
      if (j < 0 || j >= N * N || px[j] !== target) continue;
      px[j] = fill;
      const x = j % N;
      if (x > 0) stack.push(j - 1);
      if (x < N - 1) stack.push(j + 1);
      stack.push(j - N, j + N);
    }
  }
  draw();
}

let painting = false;
grid.addEventListener("mousedown", e => { snapshot(); painting = true; apply(cellAt(e)); });
grid.addEventListener("mousemove", e => { if (painting && (tool === "paint" || tool === "erase")) apply(cellAt(e)); });
window.addEventListener("mouseup", () => painting = false);

function setTool(t) {
  tool = t;
  for (const b of ["paint", "erase", "fill", "pick"])
    document.getElementById("t-" + b).classList.toggle("active", b === t);
}
for (const t of ["paint", "erase", "fill", "pick"])
  document.getElementById("t-" + t).onclick = () => setTool(t);

function renderSwatches() {
  const box = document.getElementById("swatches");
  box.innerHTML = "";
  palette.forEach((c, i) => {
    const d = document.createElement("div");
    d.className = "sw" + (i === selSwatch ? " sel" : "");
    d.style.background = c;
    d.onclick = () => { selSwatch = i; color = c; setTool("paint"); renderSwatches(); };
    d.oncontextmenu = ev => { ev.preventDefault();
      palette[i] = document.getElementById("custom").value;
      selSwatch = i; color = palette[i]; renderSwatches(); draw(); };
    box.appendChild(d);
  });
}

document.getElementById("size").onchange = e => { snapshot(); resize(+e.target.value); };
document.getElementById("undo").onclick = () => { if (undoStack.length) { px = undoStack.pop(); draw(); } };
document.getElementById("clear").onclick = () => { snapshot(); px = blank(N); draw(); };
window.addEventListener("keydown", e => {
  if (e.key === "u") document.getElementById("undo").click();
  if (e.key === "e") setTool(tool === "erase" ? "paint" : "erase");
});

function exportC() {
  const name = (document.getElementById("name").value || "sprite")
    .toLowerCase().replace(/[^a-z0-9_]/g, "");
  let out = `/* ${name}: ${N}x${N}, painted with the ArcadeOS sprite editor */\n`;
  out += `#define _ SURF_TRANSPARENT\n`;
  out += `static const uint32_t ${name}_px[${N * N}] = {\n`;
  for (let y = 0; y < N; y++) {
    out += "    ";
    for (let x = 0; x < N; x++) {
      const c = px[y * N + x];
      out += (c ? "0x" + c.slice(1).toUpperCase() : "_") + ", ";
    }
    out = out.trimEnd() + "\n";
  }
  out += `};\n`;
  out += `static const sprite_t spr_${name} = { ${name}_px, ${N}, ${N} };\n`;
  out += `#undef _\n`;
  document.getElementById("out").value = out;
  return out;
}
document.getElementById("export").onclick = exportC;
document.getElementById("copy").onclick = () => navigator.clipboard.writeText(exportC());
document.getElementById("download").onclick = () => {
  const name = (document.getElementById("name").value || "sprite").toLowerCase();
  const blob = new Blob([exportC()], { type: "text/plain" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = name + ".h";
  a.click();
};

/* Restore the last session */
try {
  const saved = JSON.parse(localStorage.getItem("arcade-sprite"));
  if (saved && saved.px) {
    N = saved.n; px = saved.px;
    if (saved.palette) palette = saved.palette;
    if (saved.name) document.getElementById("name").value = saved.name;
    document.getElementById("size").value = String(N);
  }
} catch (e) { /* fresh start */ }

renderSwatches();
resize(N);
</script>
</body>
</html>
